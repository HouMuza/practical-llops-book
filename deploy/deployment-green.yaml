$schema: https://azuremlschemas.azureedge.net/latest/managedOnlineDeployment.schema.json
name: green
endpoint_name: qwen3-yourname-prod
model: azureml:qwen3-0-6b-candidate:1
code_configuration:
  code: ../
  scoring_script: serve/score.py
environment:
  build:
    path: ../
    dockerfile_path: serve/Dockerfile
instance_type: Standard_E4s_v3
instance_count: 1
request_settings:
  request_timeout_ms: 90000
  max_concurrent_requests_per_instance: 8
app_insights_enabled: true
environment_variables:
  MODEL_NAME: Qwen/Qwen3-0.6B
  DEVICE: cpu
  DTYPE: fp32
  OTEL_SERVICE_NAME: llmops-qwen3-green
  # Set APPLICATIONINSIGHTS_CONNECTION_STRING via Azure ML secrets or workspace env to enable Azure Monitor
